services:
  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"

volumes:
  valkey_data:
  qdrant_data:
